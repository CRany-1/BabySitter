name: Build VST3

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --target BabySitter

    - name: Upload VST3
      uses: actions/upload-artifact@v4
      with:
        name: BabySitter-VST3
        path: build/BabySitter_artefacts/Release/VST3/BabySitter.vst3
